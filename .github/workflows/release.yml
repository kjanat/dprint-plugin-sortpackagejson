name: release

on:
  push:
    tags:
      # Bare-version convention; we explicitly do NOT support `v0.1.0`.
      # Tag-format is also gated by the first job below as a fail-safe.
      - "[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  tag-format-gate:
    name: tag-format gate
    runs-on: ubuntu-latest
    steps:
      - name: reject v-prefixed tags
        run: |
          tag='${{ github.ref_name }}'
          if [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag '$tag' OK"
          else
            echo "::error::tag '$tag' is not bare-version (no v-prefix). Use e.g. 0.1.0"
            exit 1
          fi

  build:
    name: build + upload
    runs-on: ubuntu-latest
    needs: tag-format-gate
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just

      - name: schema drift (safety net)
        run: just schema-check

      - name: package release artifacts
        run: just package

      - name: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            plugin.wasm
            plugin.wasm.sha256
            schema.json
            schema.json.sha256
